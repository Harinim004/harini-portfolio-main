<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Harini M — Futuristic Portfolio</title>

    <!-- Vercel rewrite/query compatibility (provided by you) -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>

    <!-- TanStack Start injects correct head/scripts via SSR; this file is the Vercel entrypoint -->
  </head>

  <body>
    <div id="root"></div>

    <!--
      TanStack Start SSR output + Vite client bundle:
      Vite build normally emits this at /assets/*.js and/or a generated entry.
      TanStack Start handles the script wiring at runtime.

      For most TanStack Start+Vite setups, the correct client entry is served at:
      /client/index.js (or similar). If your build generates a different entry,
      adjust the src below to match Vite output.
    -->
    <script type="module" src="/src/start.ts"></script>
  </body>
</html>
